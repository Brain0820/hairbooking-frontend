<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>★琉光販賣所-日系編髮線上預約★</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #f6f1eb;
  --card: #fffaf4;
  --primary: #b48a63;
  --primary-dark: #9c7350;
  --text: #4a3b2c;
  --hint: #9a8f84;
}

* {
  box-sizing: border-box;
  font-family: "Noto Sans TC","Microsoft JhengHei",sans-serif;
}

body {
  background: var(--bg);
  padding: 40px 16px;
  color: var(--text);
}

.container {
  max-width: 420px;
  margin: auto;
  background: var(--card);
  padding: 28px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-bottom: 24px;
  font-size: 22px;
}

label {
  display:block;
  margin-top:18px;
  font-size:14px;
}

input, select {
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}

/* ✅ 灰色提示文字 */
.hint {
  margin-top:6px;
  font-size:13px;
  color: var(--hint);
}

button {
  width:100%;
  margin-top:28px;
  padding:14px;
  background:var(--primary);
  border:none;
  border-radius:16px;
  font-size:17px;
  color:white;
  cursor:pointer;
}

button:hover { background: var(--primary-dark); }

/* ===== Modal ===== */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}
.modal-box {
  background:white;
  padding:26px;
  border-radius:16px;
  max-width:340px;
  width:90%;
  text-align:center;
}
.modal-box p {
  font-size:16px;
  margin:10px 0;
}
.modal-box button {
  margin-top:12px;
}

/* ===== Loading ===== */
.loading {
  position:fixed;
  inset:0;
  background:rgba(246,241,235,0.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:30;
}
.spinner {
  width:46px;
  height:46px;
  border:4px solid #ddd;
  border-top:4px solid var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
  <h2>琉光販賣所-日系編髮線上預約</h2>

  <label>姓名</label>
  <input id="name" placeholder="請輸入姓名">
  <div class="hint">請填寫全名以利核對</div>

  <label>電話</label>
  <input id="phone" placeholder="0912345678" maxlength="10">
  <div class="hint">請輸入 10 碼手機號碼</div>

  <label>匯款後 5 碼 訂金$800 (當天可直接折抵店內商品)</label>
  <input id="paycode" placeholder="12345" maxlength="5">
  <div class="hint">請填寫轉帳完成後的帳號末 5 碼</div>

  <label>日期</label>
  <select id="dateSelect">
    <option value="">請選擇可預約日期</option>
  </select>
  <div class="hint">若日期未出現代表該日已額滿</div>

  <label>時間</label>
  <select id="timeSelect">
    <option value="">請先選擇日期</option>
  </select>
  <div class="hint">請先選擇日期後再選時間</div>

  <button onclick="prepareConfirm()">送出預約</button>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<script>
const BACKEND = "https://hairbooking-backend.onrender.com";
const WEEKDAY = ["日","一","二","三","四","五","六"];

const modal = document.getElementById("modal");
const modalBox = document.getElementById("modalBox");
const loading = document.getElementById("loading");
const dateSelect = document.getElementById("dateSelect");
const timeSelect = document.getElementById("timeSelect");

// ===== Loading 控制 =====
function showLoading(){ loading.style.display="flex"; }
function hideLoading(){ loading.style.display="none"; }

// ===== Modal 控制 =====
function showModal(html){
  modalBox.innerHTML = html;
  modal.style.display = "flex";
}
function closeModal(){ modal.style.display = "none"; }

// ===== 日期顯示 =====
function formatDateLabel(iso){
  const d=new Date(iso);
  const m=d.getMonth()+1;
  const day=String(d.getDate()).padStart(2,"0");
  return `${m}月${day}日（${WEEKDAY[d.getDay()]}）`;
}

// ===== 載入日期 =====
showLoading();
fetch(`${BACKEND}/available-dates`)
.then(r=>r.json())
.then(list=>{
  list.forEach(d=>{
    const o=document.createElement("option");
    o.value=d.value;
    o.textContent=formatDateLabel(d.value);
    dateSelect.appendChild(o);
  });
})
.finally(()=>hideLoading());

// ===== 載入時間 =====
dateSelect.onchange=()=>{
  timeSelect.innerHTML="<option>請選擇時間</option>";
  if(!dateSelect.value) return;
  showLoading();
  fetch(`${BACKEND}/available-times?date=${dateSelect.value}`)
  .then(r=>r.json())
  .then(times=>{
    if(!times.length){
      const o=document.createElement("option");
      o.textContent="此日已額滿";
      o.disabled=true;
      timeSelect.appendChild(o);
      return;
    }
    times.forEach(t=>{
      const o=document.createElement("option");
      o.value=t;o.textContent=t;
      timeSelect.appendChild(o);
    });
  })
  .finally(()=>hideLoading());
};

// ===== 確認 =====
function prepareConfirm(){
  const name=nameEl.value.trim();
  const phone=phoneEl.value.trim();
  const pay=paycodeEl.value.trim();

  if(!name||!phone||!pay||!dateSelect.value||!timeSelect.value)
    return showModal("<p>請完整填寫所有欄位</p><button onclick='closeModal()'>確定</button>");

  if(!/^\d{10}$/.test(phone))
    return showModal("<p>電話需為 10 碼數字</p><button onclick='closeModal()'>確定</button>");

  if(!/^\d{5}$/.test(pay))
    return showModal("<p>匯款後 5 碼需為 5 位數</p><button onclick='closeModal()'>確定</button>");

  showModal(`
    <p style="font-weight:bold">請確認預約資訊</p>
    <p>姓名：${name}</p>
    <p>電話：${phone}</p>
    <p>匯款後 5 碼：${pay}</p>
    <p>日期：${dateSelect.options[dateSelect.selectedIndex].text}</p>
    <p>時間：${timeSelect.value}</p>
    <button onclick="submit()">確認送出</button>
    <button onclick="closeModal()">取消</button>
  `);
}

// ===== 送出 =====
function submit(){
  showLoading();
  fetch(`${BACKEND}/reserve`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      name:nameEl.value,
      phone:phoneEl.value,
      paycode:paycodeEl.value,
      date:dateSelect.value,
      time:timeSelect.value
    })
  })
  .then(r=>r.json())
  .then(()=>showModal("<p>✅ 預約成功</p><button onclick='closeModal()'>確定</button>"))
  .finally(()=>hideLoading());
}

const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const paycodeEl=document.getElementById("paycode");
</script>

</body>
</html>
``
