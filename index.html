<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>★琉光販賣所-日系編髮線上預約★</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #f6f1eb;
  --card: #fffaf4;
  --primary: #b48a63;
  --primary-dark: #9c7350;
  --text: #4a3b2c;
  --hint: #9a8f84;

  /* 匯款資訊用 */
  --bank-bg: rgba(244,236,228,0.6);
  --bank-border: #d8c9b8;
}

* {
  box-sizing: border-box;
  font-family: "Noto Sans TC","Microsoft JhengHei",sans-serif;
}

body {
  background: var(--bg);
  padding: 40px 16px;
  color: var(--text);
}

.container {
  max-width: 420px;
  margin: auto;
  background: var(--card);
  padding: clamp(20px, 6vw, 28px);
  border-radius: clamp(16px, 6vw, 20px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-bottom: 24px;
  font-size: clamp(18px, 5vw, 22px);
  line-height: 1.35;
}

label {
  display:block;
  margin-top:18px;
  font-size: clamp(13px, 3.5vw, 14px);
}

input, select {
  width:100%;
  margin-top:6px;
  font-size: clamp(14px, 4vw, 16px);
  padding: clamp(10px, 3vw, 12px);
  border-radius: clamp(10px, 3vw, 12px);
  border:1px solid #ddd;
}

.hint {
  margin-top:6px;
  font-size: clamp(12px, 3.2vw, 13px);
  color: var(--hint);
}

button {
  width:100%;
  margin-top: clamp(22px, 6vw, 28px);
  padding: clamp(12px, 4vw, 14px);
  background:var(--primary);
  border:none;
  border-radius: clamp(14px, 4vw, 16px);
  font-size: clamp(15px, 4vw, 17px);
  color:white;
  cursor:pointer;
}
button:hover { background: var(--primary-dark); }

/* ===== ✅ 匯款資訊區塊（只新增） ===== */
.bank-info {
  margin-top: 24px;
  padding: 14px 16px;
  border-radius: 12px;
  background: var(--bank-bg);
  border: 1px dashed var(--bank-border);
}

.bank-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #6b5a4a;
}

.bank-row {
  font-size: 14px;
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}

.bank-note {
  margin-top: 6px;
  font-size: 12px;
  color: var(--hint);
}

/* ===== Modal ===== */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}
.modal-box {
  background:white;
  padding: clamp(20px, 5vw, 26px);
  border-radius: clamp(14px, 5vw, 16px);
  max-width:340px;
  width:90%;
  text-align:center;
}
.modal-box p {
  font-size: clamp(14px, 4vw, 16px);
  margin:10px 0;
}

/* ===== Loading ===== */
.loading {
  position:fixed;
  inset:0;
  background:rgba(246,241,235,0.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:30;
}
.spinner {
  width:46px;
  height:46px;
  border:4px solid #ddd;
  border-top:4px solid var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
  <h2>琉光販賣所-日系編髮線上預約</h2>

  <label>姓名</label>
  <input id="name" placeholder="請輸入姓名">
  <div class="hint">請填寫全名以利核對</div>

  <label>電話</label>
  <input id="phone" placeholder="0912345678" maxlength="10">
  <div class="hint">請輸入 10 碼手機號碼</div>

  <label>匯款後5碼（訂金$800當天可直接折抵店內商品)</label>
  <input id="paycode" placeholder="12345" maxlength="5">
  <div class="hint">請填寫轉帳完成後的帳號末 5 碼</div>

  <label>日期</label>
  <select id="dateSelect">
    <option value="">請選擇可預約日期</option>
  </select>
  <div class="hint">若日期未出現代表該日已額滿</div>

  <label>時間</label>
  <select id="timeSelect">
    <option value="">請先選擇日期</option>
  </select>
  <div class="hint">請先選擇日期後再選時間</div>

  <!-- ✅ 只加這一塊 -->
  <div class="bank-info">
    <div class="bank-title">匯款資訊</div>
    <div class="bank-row">銀行：永豐銀行（807）</div>
    <div class="bank-row">帳號：14101800063837</div>
    <div class="bank-note">※ 請完成匯款後，再填寫上方「匯款後 5 碼」</div>
  </div>

  <button onclick="prepareConfirm()">送出預約</button>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<script>
/* ❗ JS 完全不動，維持你目前正常運作的版本 */
</script>

</body>
</html>
