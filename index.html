<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>線上預約系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f5f5f5;
      padding: 30px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    label {
      margin-top: 12px;
      display: block;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      font-size: 16px;
      padding: 10px;
      margin-top: 6px;
    }

    button {
      margin-top: 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>線上預約</h2>

  <label>姓名</label>
  <input id="name" type="text" required>

  <label>電話</label>
  <input id="phone" type="tel" maxlength="10" placeholder="0912345678">

  <label>匯款後 5 碼</label>
  <input id="paycode" type="text" maxlength="5" placeholder="12345">

  <label>日期</label>
  <input id="date" type="date">

  <label>時間</label>
  <select id="time">
    <option>12:00</option>
    <option>12:20</option>
    <option>12:40</option>
    <option>13:00</option>
    <option>13:20</option>
    <option>13:40</option>
    <option>14:00</option>
    <option>14:20</option>
    <option>14:40</option>
    <option>15:00</option>
    <option>15:20</option>
    <option>15:40</option>
    <option>16:00</option>
    <option>16:20</option>
    <option>16:40</option>
    <option>17:00</option>
    <option>17:20</option>
    <option>17:40</option>
    <option>18:00</option>
  </select>

  <button onclick="submitForm()">送出預約</button>

  <div class="message" id="message"></div>
</div>

<script>
function submitForm() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const paycode = document.getElementById("paycode").value.trim();
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const msg = document.getElementById("message");

  // 簡單前台檢查（輔助用）
  if (!name || !phone || !paycode || !date || !time) {
    msg.style.color = "red";
    msg.innerText = "請填寫所有欄位";
    return;
  }

  msg.style.color = "blue";
  msg.innerText = "送出預約中...";

  fetch("https://hairbooking-backend.onrender.com/reserve", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: name,
      phone: phone,
      paycode: paycode,
      date: date,
      time: time
    })
  })
  .then(async res => {
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.detail || "預約失敗");
    }
    return data;
  })
  .then(data => {
    msg.style.color = "green";
    msg.innerText = data.message || "✅ 預約成功";
  })
  .catch(err => {
    msg.style.color = "red";
    msg.innerText = err.message;
  });
}
</script>


</body>
</html>
