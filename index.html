<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>★琉光販賣所-日系編髮線上預約★</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #f6f1eb;
  --card: #fffaf4;
  --primary: #b48a63;
  --primary-dark: #9c7350;
  --text: #4a3b2c;
  --hint: #9a8f84;
}

/* ===== 基本樣式 ===== */
* {
  box-sizing: border-box;
  font-family: "Noto Sans TC","Microsoft JhengHei",sans-serif;
}

body {
  background: var(--bg);
  padding: 40px 16px;
  color: var(--text);
}

.container {
  max-width: 420px;
  margin: auto;
  background: var(--card);
  padding: clamp(20px, 6vw, 28px);
  border-radius: clamp(16px, 6vw, 20px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-bottom: 24px;
  font-size: clamp(18px, 5vw, 22px);
  line-height: 1.35;
}

label {
  display:block;
  margin-top:18px;
  font-size: clamp(13px, 3.5vw, 14px);
}

input, select {
  width:100%;
  margin-top:6px;
  font-size: clamp(14px, 4vw, 16px);
  padding: clamp(10px, 3vw, 12px);
  border-radius: clamp(10px, 3vw, 12px);
  border:1px solid #ddd;
}

.hint {
  margin-top:6px;
  font-size: clamp(12px, 3.2vw, 13px);
  color: var(--hint);
}

button {
  width:100%;
  margin-top: clamp(22px, 6vw, 28px);
  padding: clamp(12px, 4vw, 14px);
  background:var(--primary);
  border:none;
  border-radius: clamp(14px, 4vw, 16px);
  font-size: clamp(15px, 4vw, 17px);
  color:white;
  cursor:pointer;
}
button:hover { background: var(--primary-dark); }

/* ===== Modal ===== */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}
.modal-box {
  background:white;
  padding: clamp(20px, 5vw, 26px);
  border-radius: clamp(14px, 5vw, 16px);
  max-width:340px;
  width:90%;
  text-align:center;
}
.modal-box p {
  font-size: clamp(14px, 4vw, 16px);
  margin:10px 0;
}

/* ===== Loading ===== */
.loading {
  position:fixed;
  inset:0;
  background:rgba(246,241,235,0.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:30;
}
.spinner {
  width:46px;
  height:46px;
  border:4px solid #ddd;
  border-top:4px solid var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
  <h2>琉光販賣所-日系編髮線上預約</h2>

  <label>姓名</label>
  <input id="name" placeholder="請輸入姓名">
  <div class="hint">請填寫全名以利核對</div>

  <label>電話</label>
  <input id="phone" placeholder="0912345678" maxlength="10">
  <div class="hint">請輸入 10 碼手機號碼</div>

  <label>匯款後5碼（訂金$800當天可直接折抵店內商品)</label>
  <input id="paycode" placeholder="12345" maxlength="5">
  <div class="hint">請填寫轉帳完成後的帳號末 5 碼</div>

  <label>日期</label>
  <select id="dateSelect">
    <option value="">請選擇可預約日期</option>
  </select>
  <div class="hint">若日期未出現代表該日已額滿</div>

  <label>時間</label>
  <select id="timeSelect">
    <option value="">請先選擇日期</option>
  </select>
  <div class="hint">請先選擇日期後再選時間</div>

  <button onclick="prepareConfirm()">送出預約</button>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<script>
const BACKEND = "https://hairbooking-backend.onrender.com";
const WEEKDAY = ["日","一","二","三","四","五","六"];

const dateSelect = document.getElementById("dateSelect");
const timeSelect = document.getElementById("timeSelect");
const modal = document.getElementById("modal");
const modalBox = document.getElementById("modalBox");
const loading = document.getElementById("loading");

const nameEl = document.getElementById("name");
const phoneEl = document.getElementById("phone");
const paycodeEl = document.getElementById("paycode");

/* ===== 工具 ===== */
function showLoading(){ loading.style.display="flex"; }
function hideLoading(){ loading.style.display="none"; }

function showModal(html){
  modalBox.innerHTML = html;
  modal.style.display = "flex";
}
function closeModal(){
  modal.style.display = "none";
}

function formatDateLabel(iso){
  const d = new Date(iso);
  const m = d.getMonth() + 1;
  const day = String(d.getDate()).padStart(2,"0");
  return `${m}月${day}日（${WEEKDAY[d.getDay()]}）`;
}

/* ===== 載入日期（✅ 修正點） ===== */
showLoading();
fetch(`${BACKEND}/available-dates`)
  .then(r => r.json())
  .then(list => {
    list.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d.value;
      opt.textContent = formatDateLabel(d.value); // ✅ 正解
      dateSelect.appendChild(opt);
    });
  })
  .finally(() => hideLoading());

/* ===== 日期 → 時間 ===== */
dateSelect.addEventListener("change", () => {
  timeSelect.innerHTML = "<option value=''>請先選擇日期</option>";
  if (!dateSelect.value) return;

  showLoading();
  fetch(`${BACKEND}/available-times?date=${dateSelect.value}`)
    .then(r => r.json())
    .then(times => {
      if (!times.length) {
        const opt = document.createElement("option");
        opt.textContent = "此日已額滿";
        opt.disabled = true;
        timeSelect.appendChild(opt);
        return;
      }
      times.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        timeSelect.appendChild(opt);
      });
    })
    .finally(() => hideLoading());
});

/* ===== 確認送出 ===== */
function prepareConfirm(){
  const name = nameEl.value.trim();
  const phone = phoneEl.value.trim();
  const pay = paycodeEl.value.trim();

  if(!name || !phone || !pay || !dateSelect.value || !timeSelect.value)
    return showModal("<p>請完整填寫所有欄位</p><button onclick='closeModal()'>確定</button>");

  if(!/^\d{10}$/.test(phone))
    return showModal("<p>電話需為 10 碼數字</p><button onclick='closeModal()'>確定</button>");

  if(!/^\d{5}$/.test(pay))
    return showModal("<p>匯款後 5 碼需為 5 位數</p><button onclick='closeModal()'>確定</button>");

  showModal(`
    <p style="font-weight:bold">請確認預約資訊</p>
    <p>姓名：${name}</p>
    <p>電話：${phone}</p>
    <p>匯款後 5 碼：${pay}</p>
    <p>日期：${dateSelect.options[dateSelect.selectedIndex].text}</p>
    <p>時間：${timeSelect.value}</p>
    <button onclick="submit()">確認送出</button>
    <button onclick="closeModal()">取消</button>
  `);
}

/* ===== 送出 ===== */
function submit(){
  showLoading();
  fetch(`${BACKEND}/reserve`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      name:nameEl.value,
      phone:phoneEl.value,
      paycode:paycodeEl.value,
      date:dateSelect.value,
      time:timeSelect.value
    })
  })
  .then(r=>r.json())
  .then(()=>showModal("<p>✅ 預約成功</p><button onclick='closeModal()'>確定</button>"))
  .finally(()=>hideLoading());
}
</script>

</body>
</html>
